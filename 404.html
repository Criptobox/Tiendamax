<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — TiendaMax</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjMEQwRDBEIi8+PHRleHQgeT0iNzIiIHg9IjUwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LXNpemU9IjYyIiBmb250LWZhbWlseT0iR2VvcmdpYSxzZXJpZiIgZm9udC13ZWlnaHQ9IjkwMCIgZmlsbD0iI0M5QTk2RSI+TTwvdGV4dD48L3N2Zz4=">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0D0D0D;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 48px;
            text-decoration: none;
        }
        .logo-badge {
            width: 40px; height: 40px;
            background: #C9A96E;
            color: #0D0D0D;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif;
            font-weight: 900; font-size: 22px;
        }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
        .logo-text em { color: #C9A96E; font-style: normal; }
        .code-wrap {
            position: relative;
            margin-bottom: 24px;
        }
        .code-404 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(96px, 22vw, 160px);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #C9A96E, #E8C88A, #C9A96E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -4px;
        }
        .gold-line {
            width: 60px; height: 2px;
            background: linear-gradient(90deg, transparent, #C9A96E, transparent);
            margin: 0 auto 28px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(22px, 5vw, 32px);
            font-weight: 700;
            margin-bottom: 14px;
            color: rgba(255,255,255,0.92);
        }
        p {
            color: rgba(255,255,255,0.45);
            font-size: 15px;
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto 40px;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #FF6B35, #E8501E);
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            transition: transform .2s, box-shadow .2s;
            box-shadow: 0 4px 20px rgba(255,107,53,0.35);
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255,107,53,0.5);
        }
        .btn-wa {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            padding: 13px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
            transition: background .2s, border-color .2s;
        }
        .btn-wa:hover {
            background: rgba(37,211,102,0.12);
            border-color: rgba(37,211,102,0.4);
            color: #25d366;
        }
        .btns { display: flex; flex-direction: column; align-items: center; gap: 0; }
        .particles {
            position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: #C9A96E;
            border-radius: 50%;
            opacity: 0;
            animation: float var(--d, 8s) var(--delay, 0s) infinite ease-in-out;
        }
        @keyframes float {
            0%   { opacity: 0; transform: translateY(100vh) scale(0); }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.2; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1.5); }
        }
        .content { position: relative; z-index: 1; }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="content">
        <a href="/" class="logo">
            <div class="logo-badge">M</div>
            <span class="logo-text">Tienda<em>Max</em></span>
        </a>
        <div class="code-wrap">
            <div class="code-404">404</div>
        </div>
        <div class="gold-line"></div>
        <h1>Página no encontrada</h1>
        <p>La página que buscas no existe o fue movida. Vuelve al inicio y encuentra lo que necesitas.</p>
        <div class="btns">
            <a href="/" class="btn-home">🏠 Volver al inicio</a>
            <a href="https://wa.me/5354320170?text=Hola,%20necesito%20ayuda" class="btn-wa" target="_blank" rel="noopener">
                💬 Contactar soporte
            </a>
        </div>
    </div>
    <script>
        const p = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const d = document.createElement('div');
            d.className = 'particle';
            d.style.cssText = `left:${Math.random()*100}%;--d:${6+Math.random()*10}s;--delay:${Math.random()*8}s;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;`;
            p.appendChild(d);
        }
    </script>
</body>
</html>
