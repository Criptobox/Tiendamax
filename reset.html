<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reiniciando TiendaMax...</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D0D0D;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;text-align:center}
  h1{color:#C9A96E;font-size:22px;margin-bottom:20px}
  #log{background:#1a1a1a;border:2px solid #C9A96E;border-radius:8px;padding:15px;font-family:monospace;font-size:12px;color:#0f0;text-align:left;white-space:pre-wrap;max-width:400px;width:100%;min-height:200px;margin:10px 0}
  .spin{width:40px;height:40px;border:3px solid #C9A96E33;border-top-color:#C9A96E;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{display:inline-block;background:linear-gradient(135deg,#FF6B35,#E8501E);color:#fff;text-decoration:none;padding:12px 28px;border-radius:50px;font-weight:600;margin-top:15px;font-size:15px}
  .ok{color:#0f0;font-weight:bold}
  .err{color:#f55}
</style>
</head>
<body>
<h1>🔄 Reiniciando TiendaMax</h1>
<div class="spin"></div>
<div id="log">Iniciando limpieza...
</div>
<a href="/" id="goBtn" style="display:none">→ Abrir TiendaMax</a>

<script>
const log = document.getElementById('log');
const goBtn = document.getElementById('goBtn');
function l(msg, cls='') {
  const span = document.createElement('div');
  if (cls) span.className = cls;
  span.textContent = '• ' + msg;
  log.appendChild(span);
}

(async function() {
  try {
    // 1. Desregistrar TODOS los service workers
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      l('Service Workers encontrados: ' + regs.length);
      for (const reg of regs) {
        await reg.unregister();
        l('Desregistrado: ' + (reg.scope || 'unknown'), 'ok');
      }
    } else {
      l('Service Workers no soportados (OK)');
    }

    // 2. Borrar TODAS las caches
    if ('caches' in window) {
      const keys = await caches.keys();
      l('Caches encontradas: ' + keys.length);
      for (const key of keys) {
        await caches.delete(key);
        l('Borrada cache: ' + key, 'ok');
      }
    }

    // 3. Limpiar localStorage del SW (mantener wishlist y carrito)
    const mantener = ['wishlist_v1', 'carrito_v2', 'tm_theme'];
    const todo = Object.keys(localStorage);
    let borradas = 0;
    for (const k of todo) {
      if (!mantener.includes(k) && (k.startsWith('productos') || k.startsWith('categorias') || k.startsWith('subcategorias') || k.startsWith('comisiones') || k.startsWith('heroBanners'))) {
        localStorage.removeItem(k);
        borradas++;
      }
    }
    l('Entradas localStorage borradas: ' + borradas, 'ok');

    l('');
    l('✅ LIMPIEZA COMPLETA', 'ok');
    l('Redirigiendo en 3 segundos...');
    goBtn.style.display = 'inline-block';

    setTimeout(() => {
      window.location.href = '/?fresh=' + Date.now();
    }, 3000);
  } catch(e) {
    l('Error: ' + e.message, 'err');
    goBtn.style.display = 'inline-block';
  }
})();
</script>
</body>
</html>
