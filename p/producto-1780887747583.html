    background: #0D0D0D;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }
  .loader { padding: 40px; max-width: 420px; }
  .loader h2 { color: #C9A96E; font-size: 18px; margin-bottom: 8px; }
  .price  { color: #FF6B35; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .desc   { color: #888; font-size: 13px; line-height: 1.5; margin-bottom: 20px; }
  .loader a  {
    display: inline-block;
    background: linear-gradient(135deg, #FF6B35, #E8501E);
    color: #fff;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(201,169,110,0.2);
    border-top-color: #C9A96E;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loader">
  <div class="spinner"></div>
  <h2>Altavoz Bluetooth Portátil RGB</h2>
  <p class="price">$20.00 USD</p>
  <p class="desc">Compra Altavoz Bluetooth Portátil RGB en TiendaMax. CELULARES desde $20.00 USD. Consulta disponibilidad por WhatsApp.</p>
  <a href="https://tiendamax.org/?producto=1780887747583#producto-1780887747583">Abrir en TiendaMax</a>
</div>
<script>
  // Espera breve: los crawlers alcanzan a leer OpenGraph antes de redirigir.
  setTimeout(function(){ window.location.replace('https://tiendamax.org/?producto=1780887747583#producto-1780887747583'); }, 50);
</script>
</body>
</html>
