<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiendaMax | Premium Store</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="urgenciaBanner" class="urgencia-banner" style="display: none;"></div>

    <header class="header">
        <div class="container header-content">
            <div class="logo"><h1 onclick="volverAlInicio()">🛍️ TiendaMax</h1></div>
            <nav class="nav">
                <a href="#" onclick="volverAlInicio(); return false;">Inicio</a>
                <button class="theme-toggle" onclick="toggleDarkMode()">🌙</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="vistaInicio">
            <section class="hero-premium">
                <div class="hero-content">
                    <span class="badge">Lo más exclusivo</span>
                    <h2>Calidad Premium <br>en cada detalle.</h2>
                    <p>Envíos rápidos y garantía total en todos nuestros productos.</p>
                </div>
            </section>

            <h2 class="section-title">Categorías</h2>
            <div id="categoriasGrid" class="categorias-grid"></div>

            <h2 class="section-title">Más Vendidos</h2>
            <div id="masVendidosGrid" class="productos-grid"></div>
            <div id="masVendidosVacio" style="display:none; text-align:center; padding:40px; opacity:0.5;">No hay productos destacados.</div>
        </div>

        <div id="vistaCategoria" style="display:none; padding-top: 20px;">
            <div class="categoria-header">
                <button onclick="volverAlInicio()" class="btn-back">← Volver</button>
                <h2 id="tituloCategoriaActual"></h2>
            </div>
            <div id="categoriaFiltro" class="filtros-sub"></div>
            <div id="productosGrid" class="productos-grid"></div>
        </div>
    </main>

    <div class="control-buttons">
        <button class="admin-toggle" onclick="abrirLoginAdmin()">⚙️</button>
    </div>

    <div id="productDetailModal" class="modal hidden">
        <div class="modal-overlay" onclick="cerrarDetalleModal()"></div>
        <div class="modal-content">
            <button class="close-modal" onclick="cerrarDetalleModal()">×</button>
            <div class="modal-body-grid">
                <div class="modal-img-container">
                    <img id="detailProductImage" src="" alt="">
                </div>
                <div class="modal-info">
                    <h2 id="detailProductName"></h2>
                    <div class="price-box">
                        <span id="detailPriceOriginal" class="price-old"></span>
                        <span id="detailPriceActual" class="price-new"></span>
                    </div>
                    <div id="detailProductStock" class="stock-tag"></div>
                    <p id="detailProductDescription"></p>
                    <button id="detailBuyBtn" class="btn-whatsapp">🛒 Comprar por WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
