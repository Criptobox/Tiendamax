<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiendaMax - Productos Exclusivos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo"><h1 onclick="volverAlInicio()">🛍️ TiendaMax</h1></div>
            <nav class="nav">
                <a href="javascript:void(0)" onclick="volverAlInicio()">Inicio</a>
                <a href="#categorias-home">Categorías</a>
                <button class="theme-toggle" onclick="toggleDarkMode()">🌙</button>
                <button class="admin-btn" onclick="abrirLoginAdmin()">⚙️</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="vistaInicio">
            <section class="hero">
                <div class="hero-content">
                    <span class="badge-promo">🔥 OFERTA LIMITADA</span>
                    <h2>Calidad Premium en <span class="text-orange">TiendaMax</span></h2>
                    <p>Productos seleccionados con garantía y envío rápido a toda Cuba.</p>
                    <div class="cta-group">
                        <button class="btn btn-primary" onclick="scrollToProductos()">🛒 Ver Productos</button>
                        <button class="btn btn-outline" onclick="contactarWhatsApp()">💬 WhatsApp</button>
                    </div>
                </div>
                <div class="hero-image">
                    <div class="glass-card">✨ Tus Productos Aquí</div>
                </div>
            </section>

            <section id="categorias-home">
                <h2 class="section-title">🏷️ Categorías</h2>
                <div class="categorias-grid" id="categoriasGrid"></div>
            </section>

            <section id="mas-vendidos">
                <h2 class="section-title">🔥 Más Vendidos</h2>
                <div class="productos-grid" id="masVendidosGrid"></div>
                <div id="masVendidosVacio" class="vacio-msg" style="display:none;">Aún no hay destacados.</div>
            </section>
        </div>

        <div id="vistaCategoria" style="display:none;">
            <div class="categoria-header">
                <button class="btn-volver" onclick="volverAlInicio()">← Volver</button>
                <h2 id="tituloCategoriaActual">Productos</h2>
            </div>
            <div class="filtros-sub" id="categoriaFiltro"></div>
            <div class="productos-grid" id="productosGrid"></div>
        </div>
    </main>

    <div id="productDetailModal" class="modal hidden" onclick="cerrarDetalleModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close" onclick="cerrarDetalleModal()">×</span>
            <div class="modal-grid">
                <img id="detailProductImage" src="" alt="">
                <div class="modal-info">
                    <h2 id="detailProductName"></h2>
                    <p id="detailProductDescription"></p>
                    <div class="price" id="detailPriceActual"></div>
                    <button id="detailBuyBtn" class="btn btn-primary">Comprar por WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
