<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Recuperar ventas — TiendaMax</title>
<style>
  :root { --naranja:#FF6B35; --verde:#25D366; --bg:#0d0d0d; --card:#1a1a1a; --ink:#f5f5f5; --muted:#a8a8a8; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:20px; line-height:1.5; }
  .card { width:100%; max-width:440px; background:var(--card); border:1px solid #2a2a2a;
    border-radius:18px; padding:26px 22px; }
  h1 { font-size:22px; margin:0 0 6px; }
  p { color:var(--muted); margin:0 0 18px; font-size:15px; }
  ul.ventas { list-style:none; padding:0; margin:0 0 20px; }
  ul.ventas li { display:flex; justify-content:space-between; gap:12px; padding:11px 13px;
    background:#111; border:1px solid #262626; border-radius:11px; margin-bottom:8px; font-size:14px; }
  ul.ventas li span:last-child { color:var(--naranja); font-weight:700; white-space:nowrap; }
  .nombre { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  button { width:100%; border:0; border-radius:13px; padding:16px; font-size:17px; font-weight:700;
    cursor:pointer; transition:transform .12s ease, opacity .2s ease; }
  .restaurar { background:var(--naranja); color:#fff; }
  .restaurar:active { transform:scale(.98); }
  .ok { background:rgba(37,211,102,.12); border:1px solid rgba(37,211,102,.4); color:var(--verde);
    border-radius:13px; padding:16px; text-align:center; font-weight:700; display:none; margin-bottom:14px; }
  .link { display:none; text-align:center; margin-top:14px; }
  .link a { color:var(--naranja); font-weight:700; text-decoration:none; }
  .total { text-align:center; color:var(--muted); font-size:13px; margin:-6px 0 18px; }
</style>
</head>
<body>
  <div class="card">
    <h1>🛟 Recuperar ventas</h1>
    <p>Encontramos tus ventas en el respaldo. Toca el botón para restaurarlas en tu panel.</p>

    <ul class="ventas" id="lista"></ul>
    <div class="total" id="totalLinea"></div>

    <div class="ok" id="ok">✅ ¡Listo! Tus ventas fueron restauradas.</div>
    <button class="restaurar" id="btn">Restaurar mis 5 ventas</button>
    <div class="link" id="irAdmin"><a href="/admin.html">Ir al panel de administración →</a></div>
  </div>

<script>
  // Ventas reales recuperadas del respaldo de Firebase (más recientes primero)
  var VENTAS = [
    {"id":1779227634620,"fecha":"19 may 2026, 17:53","producto":"BATERIA MUST tipo LiFePO4","productoId":1778104115783,"cantidad":2,"precio":280,"comision":10,"total":560,"ganancia":20},
    {"id":1779129831746,"fecha":"18 may 2026, 14:43","producto":"Cargador inteligente 20A","productoId":1777923552923,"cantidad":1,"precio":80,"comision":5,"total":80,"ganancia":5},
    {"id":1779129725830,"fecha":"18 may 2026, 14:42","producto":"✅️Controlador de Carga Solar MPPT - 100A","productoId":1778104850733,"cantidad":1,"precio":70,"comision":5,"total":70,"ganancia":5},
    {"id":1779129713420,"fecha":"18 may 2026, 14:41","producto":"INVERSOR","productoId":1777924118004,"cantidad":1,"precio":170,"comision":10,"total":170,"ganancia":10},
    {"id":1778869744653,"fecha":"15 may 2026, 14:29","producto":"Router WiFi 6","productoId":1777924173211,"cantidad":1,"precio":130,"comision":10,"total":130,"ganancia":10}
  ];

  // Pintar la lista
  var lista = document.getElementById('lista');
  VENTAS.forEach(function(v){
    var li = document.createElement('li');
    var n = document.createElement('span'); n.className='nombre'; n.textContent = v.producto + (v.cantidad>1?(' ×'+v.cantidad):'');
    var p = document.createElement('span'); p.textContent = '$' + v.total;
    li.appendChild(n); li.appendChild(p); lista.appendChild(li);
  });
  var tot = VENTAS.reduce(function(s,v){return s+v.total;},0);
  document.getElementById('totalLinea').textContent = VENTAS.length + ' ventas · Total $' + tot;

  document.getElementById('btn').addEventListener('click', function(){
    try {
      // Merge con lo que ya exista localmente (por id), sin perder nada
      var actuales = [];
      try { actuales = JSON.parse(localStorage.getItem('registroVentas') || '[]'); } catch(e){ actuales = []; }
      if (!Array.isArray(actuales)) actuales = [];
      var porId = {};
      actuales.concat(VENTAS).forEach(function(v){ if(v && v.id) porId[v.id] = v; });
      var merged = Object.keys(porId).map(function(k){return porId[k];})
                         .sort(function(a,b){return b.id - a.id;});
      localStorage.setItem('registroVentas', JSON.stringify(merged));
      // Quitar marcas de "eliminada" por si alguna venta quedó marcada por error
      localStorage.removeItem('_tmVentasElim');

      document.getElementById('btn').style.display = 'none';
      document.getElementById('ok').style.display = 'block';
      document.getElementById('irAdmin').style.display = 'block';
    } catch(e) {
      alert('No se pudo restaurar: ' + e.message);
    }
  });
</script>
</body>
</html>
