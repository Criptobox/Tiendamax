name: Notificaciones programadas (lote diario + cola)

on:
  schedule:
    - cron: '0 13 * * *'   # 09:00 Cuba
    - cron: '0 17 * * *'   # 13:00 Cuba — LOTE DIARIO DE PRODUCTOS
    - cron: '0 22 * * *'   # 18:00 Cuba
    - cron: '0 1 * * *'    # 21:00 Cuba
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: push-notifications
  cancel-in-progress: false

jobs:
  flush:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin

      - name: Procesar cola y enviar
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SOLO_FLUSH: "1"
        run: python scripts/send_notifications.py

      - name: Commit cola actualizada (con reintento por race condition)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .push_queue.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✅ Sin cambios en la cola"
            exit 0
          fi
          git commit -m "chore: actualizar cola de notificaciones [skip ci]"

          for i in 1 2 3 4 5; do
            echo "Intento $i de push..."
            if git push; then
              echo "✅ Push exitoso en intento $i"
              exit 0
            fi
            echo "⚠️  Push rechazado. Pull --rebase y reintentando..."
            git pull --rebase origin main || {
              git rebase --abort 2>/dev/null || true
            }
            sleep 2
          done
          echo "❌ Push falló tras 5 intentos"
          exit 1
