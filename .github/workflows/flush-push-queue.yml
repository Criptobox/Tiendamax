name: Notificaciones programadas (lote diario + cola)

# Estrategia personalizada:
#  • 09:00 Cuba (13:00 UTC) → revisa cola de noche/tasa
#  • 13:00 Cuba (17:00 UTC) → envía el LOTE DIARIO de productos nuevos
#  • 18:00 Cuba (22:00 UTC) → revisa por si quedan ofertas pendientes
#  • 21:00 Cuba (01:00 UTC) → última pasada antes del silencio nocturno

on:
  schedule:
    - cron: '0 13 * * *'   # 09:00 Cuba — primera revisión del día
    - cron: '0 17 * * *'   # 13:00 Cuba — LOTE DIARIO DE PRODUCTOS NUEVOS
    - cron: '0 22 * * *'   # 18:00 Cuba — revisión tarde
    - cron: '0 1 * * *'    # 21:00 Cuba — última del día
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: push-notifications
  cancel-in-progress: false

jobs:
  flush:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin

      - name: Procesar cola y enviar
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/send_notifications.py

      - name: Commit cola actualizada
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .push_queue.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios en la cola"
            exit 0
          fi
          git commit -m "chore: actualizar cola de notificaciones [skip ci]"
          git push
