name: Notificaciones programadas (lote diario + cola)

on:
  schedule:
    - cron: '0 13 * * *' # ~09:00 Cuba (UTC-4 verano / UTC-5 invierno = ~08:00)
    - cron: '0 17 * * *' # ~13:00 Cuba — LOTE DIARIO DE PRODUCTOS
    - cron: '0 22 * * *' # ~18:00 Cuba
    - cron: '0 1 * * *'  # ~21:00 Cuba
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flush:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin

      - name: Procesar cola y enviar
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SOLO_FLUSH: "1"
        run: python scripts/send_notifications.py
