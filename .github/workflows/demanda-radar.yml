name: 🎯 Radar de demanda (busco/compro)

on:
  schedule:
    # Cada 15 min en horario activo de Cuba (~7 AM a medianoche) — los
    # clasificados se responden al momento, un intervalo largo llega tarde.
    # Cuba (verano, UTC-4): 7 AM = 11:00 UTC, medianoche = 04:00 UTC del día
    # siguiente. OJO: el cron de GitHub Actions NO es puntual — en horas pico
    # se retrasa 5–20 min y a veces salta corridas. "Cada 15 min" es el
    # objetivo, no una garantía; tiempo real de verdad necesitaría un
    # servidor propio siempre encendido, que este sitio estático no tiene.
    - cron: '*/15 11-23 * * *'
    - cron: '*/15 0-3 * * *'
  workflow_dispatch:

permissions:
  contents: write

# cancel-in-progress:false a propósito: una corrida NO debe morir a mitad
# de camino (entre mandar el Telegram y guardar el estado anti-spam), o
# re-avisaría lo mismo. Las corridas duran ~90s, muy por debajo de 15 min,
# así que no se acumulan.
concurrency:
  group: demanda-radar
  cancel-in-progress: false

jobs:
  demanda:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Instalar dependencias
        run: python -m pip install -r scripts/requirements.txt
      - name: Buscar clientes que buscan/compran
        run: python scripts/demanda_radar.py
        env:
          BOT_TOKEN:     ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          # Categorías a vigilar (coma-separadas). Vacío = todas. Empezamos
          # solo con WiFi y Energía; para agregar otra, edita esta línea.
          DEMANDA_CATEGORIAS: 'WIFI,ENERGIA'
      - name: Commit del estado (links ya avisados)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demanda_radar.json
          if git diff --cached --quiet; then
            echo "Sin cambios en demanda_radar.json."
            exit 0
          fi
          # [skip ci] — es solo estado anti-spam, no un asset del sitio: no
          # debe disparar build/deploy de Pages.
          git commit -m "chore: actualizar radar de demanda [skip ci]"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "✅ demanda_radar.json subido."
              exit 0
            fi
            echo "Push rechazado (rama detrás); reintegrando sobre origin/main…"
            git fetch origin main
            # Archivo generado: ante conflicto, conserva SIEMPRE nuestra versión.
            if ! git rebase -X theirs origin/main; then
              git checkout --theirs -- demanda_radar.json 2>/dev/null || true
              git add demanda_radar.json
              GIT_EDITOR=true git rebase --continue || git rebase --abort
            fi
            sleep $((i * 2))
          done
          echo "❌ No se pudo subir demanda_radar.json tras varios intentos." >&2
          exit 1
