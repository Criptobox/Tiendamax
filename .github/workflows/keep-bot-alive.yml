name: Keep Bot Alive

# Pinga el bot de Telegram cada 14 minutos para que Render no lo duerma.
# Requiere: secreto BOT_RENDER_URL con la URL del servicio en Render.com
# Ejemplo: https://tiendamax-bot.onrender.com

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.BOT_RENDER_URL }}/health" || echo "0")
          if [ "$STATUS" = "200" ]; then
            echo "Bot activo (HTTP $STATUS)"
          else
            echo "Ping enviado — bot estaba durmiendo (HTTP $STATUS)"
          fi
