name: Recordatorio admin (horario pico)

on:
  schedule:
    - cron: '0 16 * * *'    # ~12:00 Cuba (pico mediodía)
    - cron: '0 23 * * *'    # ~19:00 Cuba (pico noche)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recordatorio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin

      - name: Enviar recordatorio al admin
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SOLO_ADMIN_RECORDATORIO: "1"
        run: python scripts/send_notifications.py
