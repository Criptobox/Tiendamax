name: Agente nocturno (reporte de catálogo)

on:
  schedule:
    # 09:00 UTC ≈ 5:00 AM hora Cuba — deja el reporte listo antes de que abras el admin.
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-agent
  cancel-in-progress: false

jobs:
  agente:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Revisar catálogo y generar reporte
        run: python scripts/nightly_agent.py

      - name: Commit y push del reporte
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agente-reporte.json
          if git diff --cached --quiet; then
            echo "Sin cambios en el reporte."
            exit 0
          fi
          git commit -m "chore: reporte del agente nocturno [skip ci]"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "✅ reporte subido."
              exit 0
            fi
            git fetch origin main
            git rebase -X ours origin/main || { git checkout --ours -- agente-reporte.json; git add agente-reporte.json; GIT_EDITOR=true git rebase --continue || git rebase --abort; }
            sleep $((i * 2))
          done
          echo "❌ No se pudo subir el reporte." >&2
          exit 1
