name: 🔍 Diagnóstico de ventas

on:
  workflow_dispatch:

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar firebase-admin
        run: pip install firebase-admin

      - name: Leer ventas del respaldo (solo lectura)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python3 - <<'EOF'
          import json, os, firebase_admin
          from firebase_admin import credentials, db

          sa = json.loads(os.environ["FIREBASE_SERVICE_ACCOUNT"])
          cred = credentials.Certificate(sa)
          firebase_admin.initialize_app(cred, {
              "databaseURL": "https://tiendamax-8feb5-default-rtdb.firebaseio.com"
          })

          print("=" * 50)
          ventas = db.reference("ventas").get() or {}
          print(f"VENTAS EN RESPALDO (/ventas): {len(ventas)}")
          print("=" * 50)
          for key, v in (ventas.items() if isinstance(ventas, dict) else enumerate(ventas)):
              if not isinstance(v, dict):
                  print(f"  [raw] key={key} -> {v}")
                  continue
              print(f"  • {v.get('fecha','?')} | {v.get('producto','?')} | "
                    f"x{v.get('cantidad','?')} | ${v.get('precio','?')} | "
                    f"total=${v.get('total','?')} | id={v.get('id', key)}")

          # Revisar si quedaron ventas en la raíz (índices 0,1,2...) de versiones viejas
          raiz = db.reference("/").get(shallow=True) or {}
          idx = [k for k in raiz if str(k).isdigit()]
          if idx:
              print("\n--- Posibles ventas viejas en la raíz (índices numéricos) ---")
              for k in sorted(idx, key=lambda x: int(x)):
                  v = db.reference(f"/{k}").get()
                  if isinstance(v, dict) and v.get("producto"):
                      print(f"  • raíz[{k}] -> {v.get('producto')} | ${v.get('precio')} | id={v.get('id')}")

          # Volcado JSON completo de ventas REALES (excluye pruebas A/B/test)
          PRUEBA = {"a", "b", "test", "prueba", "producto a", "producto b"}
          reales = [v for v in (ventas.values() if isinstance(ventas, dict) else ventas)
                    if isinstance(v, dict)
                    and str(v.get("producto", "")).strip().lower() not in PRUEBA
                    and len(str(v.get("producto", "")).strip()) > 1]
          reales.sort(key=lambda v: v.get("id", 0))
          print("\n===JSON_VENTAS_REALES_INICIO===")
          print(json.dumps(reales, ensure_ascii=True))
          print("===JSON_VENTAS_REALES_FIN===")

          # Revisar pedidos (espejo de cada venta confirmada)
          pedidos = db.reference("pedidos").get() or {}
          print(f"\nPEDIDOS EN RESPALDO (/pedidos): {len(pedidos) if isinstance(pedidos, dict) else 0}")
          EOF
