name: optimize-images

on:
  push:
    paths:
      - 'imagenes/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: optimize-images
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Optimize JPEGs and generate thumbnails WebP
        run: python scripts/optimize_images.py

      - name: Generate WebP versions alongside originals
        run: |
          python3 - <<'PYEOF'
          from pathlib import Path
          from PIL import Image

          img_dir = Path('imagenes')
          exts = {'.jpg', '.jpeg', '.png'}
          count = 0
          for src in sorted(
              p for p in img_dir.iterdir()
              if p.suffix.lower() in exts and not p.name.startswith('.')
          ):
              webp = src.with_suffix('.webp')
              # Regenerar si no existe o la fuente es más reciente
              if not webp.exists() or src.stat().st_mtime > webp.stat().st_mtime:
                  with Image.open(src) as img:
                      if img.mode not in ('RGB', 'RGBA', 'L'):
                          img = img.convert('RGB')
                      tmp = webp.parent / ('.' + webp.name + '.tmp')
                      img.save(tmp, 'WEBP', quality=80, method=4)
                      tmp.replace(webp)
                  size = webp.stat().st_size
                  orig = src.stat().st_size
                  print(f'+ {webp.name}: {size//1024}KB (vs {orig//1024}KB JPEG)')
                  count += 1
          print(f'WebP generados/actualizados: {count}')
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imagenes/
          git diff --staged --quiet && echo "Sin cambios." || (
            git commit -m "chore: optimize images and generate WebP [skip ci]" &&
            (git push || (git pull --rebase && git push))
          )
