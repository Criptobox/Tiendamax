name: optimize-images

on:
  push:
    paths:
      - 'imagenes/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # para disparar el deploy de Pages (los commits del bot no lo hacen solos)

concurrency:
  group: optimize-images
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install -r scripts/requirements.txt
      - name: Optimize JPEGs and generate thumbnails WebP
        run: python scripts/optimize_images.py

      - name: Generate WebP versions alongside originals
        run: |
          python3 - <<'PYEOF'
          from pathlib import Path
          from PIL import Image

          img_dir = Path('imagenes')
          exts = {'.jpg', '.jpeg', '.png'}
          count = 0
          for src in sorted(
              p for p in img_dir.iterdir()
              if p.suffix.lower() in exts and not p.name.startswith('.')
          ):
              webp = src.with_suffix('.webp')
              # Regenerar si no existe o la fuente es más reciente
              if not webp.exists() or src.stat().st_mtime > webp.stat().st_mtime:
                  with Image.open(src) as img:
                      if img.mode not in ('RGB', 'RGBA', 'L'):
                          img = img.convert('RGB')
                      tmp = webp.parent / ('.' + webp.name + '.tmp')
                      img.save(tmp, 'WEBP', quality=80, method=4)
                      tmp.replace(webp)
                  size = webp.stat().st_size
                  orig = src.stat().st_size
                  print(f'+ {webp.name}: {size//1024}KB (vs {orig//1024}KB JPEG)')
                  count += 1
          print(f'WebP generados/actualizados: {count}')
          PYEOF

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imagenes/
          if git diff --staged --quiet; then
            echo "Sin cambios."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: optimize images and generate WebP [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then echo "changed=true" >> $GITHUB_OUTPUT; exit 0; fi
            git fetch origin main
            git rebase -X ours origin/main || { git checkout --ours -- imagenes/ 2>/dev/null; git add imagenes/; GIT_EDITOR=true git rebase --continue || git rebase --abort; }
            sleep $((i * 2))
          done
          echo "❌ No se pudieron subir las imágenes optimizadas." >&2
          exit 1

      - name: Publicar en GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Disparando el deploy de Pages (los commits del bot no lo disparan solos)…"
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages.yml/dispatches" \
            -d '{"ref":"main"}'
