name: Unir y minificar CSS (bundle.css)

on:
  push:
    branches:
      - main
    paths:
      - 'css/styles.css'
      - 'css/animations.css'
      - 'css/styles.banner.fix.css'
      - 'css/nuevo-diseno.css'
      - 'css/styles.fixes.css'
      - 'css/premium-theme.css'
      - 'css/light-mode.css'
      - 'css/tienda-plus.css'
      - 'css/hero-efectos.css'
      - 'scripts/build_css.py'
  workflow_dispatch:   # botón "Run workflow" para regenerar/minificar cuando quieras

permissions:
  contents: write

concurrency:
  group: build-css
  cancel-in-progress: false

jobs:
  build-css:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Unir los CSS en bundle.css
        run: python scripts/build_css.py

      - name: Minificar bundle.css con csso
        run: npx --yes csso-cli css/bundle.css -o css/bundle.css

      - name: Bump SW cache version
        run: |
          VERSION="tiendamax-$(date -u +%Y%m%d%H%M)"
          sed -i "s/const CACHE_NAME = 'tiendamax-[^']*'/const CACHE_NAME = '$VERSION'/" sw.js
          echo "SW version: $VERSION"

      - name: Sincronizar cache-busting (?v=) en HTML
        run: python scripts/bump_versions.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add css/bundle.css sw.js index.html admin.html
          if git diff --cached --quiet; then
            echo "Sin cambios — nada que subir."
            exit 0
          fi
          git commit -m "chore: regenerar y minificar css/bundle.css [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            git pull --rebase origin main || git rebase --abort 2>/dev/null
            sleep 2
          done
          exit 1
