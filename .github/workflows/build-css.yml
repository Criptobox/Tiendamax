name: Unir y minificar CSS (bundle.css)

on:
  push:
    branches:
      - main
    paths:
      # Glob en vez de lista manual: un CSS fuente nuevo (agregado al ORDEN de
      # build_css.py) dispara el rebuild automáticamente sin tener que acordarse
      # de añadirlo aquí también. bundle.css queda excluido (lo genera este mismo
      # workflow; incluirlo causaría un loop de commits).
      - 'css/*.css'
      - '!css/bundle.css'
      - 'scripts/build_css.py'
  workflow_dispatch:   # botón "Run workflow" para regenerar/minificar cuando quieras

permissions:
  contents: write
  actions: write   # para disparar el deploy de Pages (los commits del bot no lo hacen solos)

# Grupo compartido con minify-js para que NO corran a la vez (evita la carrera
# de push al commitear ambos bundles sobre main).
concurrency:
  group: repo-autobuild
  cancel-in-progress: false

jobs:
  build-css:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Unir los CSS en bundle.css
        run: python scripts/build_css.py

      - name: Minificar bundle.css con csso
        run: npx --yes csso-cli css/bundle.css -o css/bundle.css

      - name: Bump SW cache version
        run: |
          VERSION="tiendamax-$(date -u +%Y%m%d%H%M)"
          sed -i "s/const CACHE_NAME = 'tiendamax-[^']*'/const CACHE_NAME = '$VERSION'/" sw.js
          echo "SW version: $VERSION"

      - name: Sincronizar cache-busting (?v=) en HTML
        run: python scripts/bump_versions.py

      - name: Commit y push si hubo cambios
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add css/bundle.css sw.js index.html admin.html
          if git diff --cached --quiet; then
            echo "Sin cambios — nada que subir."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: regenerar y minificar css/bundle.css [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then echo "changed=true" >> $GITHUB_OUTPUT; exit 0; fi
            git pull --rebase origin main || git rebase --abort 2>/dev/null
            sleep 2
          done
          exit 1

      - name: Publicar en GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Disparando el deploy de Pages (los commits del bot no lo disparan solos)…"
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages.yml/dispatches" \
            -d '{"ref":"main"}'
