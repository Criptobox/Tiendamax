name: 📢 Publicar todos los productos en Telegram

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publicar-todos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests pillow

      - name: Publicar todos los productos activos
        run: python bot/publish_todos.py
        env:
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}

      - name: Guardar IDs de mensajes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot/telegram_messages.json
          if git diff --cached --quiet; then
            echo "Sin cambios de IDs para subir"
            exit 0
          fi
          git commit -m "chore: guardar IDs mensajes Telegram"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "✅ IDs de Telegram guardados."
              exit 0
            fi
            git fetch origin main
            git rebase -X ours origin/main || { git checkout --ours -- bot/telegram_messages.json; git add bot/telegram_messages.json; GIT_EDITOR=true git rebase --continue || git rebase --abort; }
            sleep $((i * 2))
          done
          echo "❌ No se pudieron guardar los IDs de mensajes de Telegram." >&2
          exit 1
