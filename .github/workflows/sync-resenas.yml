name: Sincronizar cache de reseñas

on:
  schedule:
    # Cada hora (minute 7 para no chocar con otros workflows en :00/:30)
    - cron: '7 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/sync_resenas.py'
      - '.github/workflows/sync-resenas.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Sincronizar reseñas desde Firebase
        run: python scripts/sync_resenas.py
      - name: Commit si hubo cambios
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resenas-cache.json
          if git diff --cached --quiet; then
            echo "Sin cambios en resenas-cache.json. Finalizando."
            exit 0
          fi
          git commit -m "chore: actualizar cache de reseñas desde Firebase"
          for i in 1 2 3 4; do
            if git push; then exit 0; fi
            sleep $((i * 3))
            git pull --rebase origin main || git rebase --abort 2>/dev/null
          done
          git push
