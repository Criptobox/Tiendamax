name: Sincronizar cache de reseñas

on:
  schedule:
    # Cada hora (minute 7 para no chocar con otros workflows en :00/:30)
    - cron: '7 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/sync_resenas.py'
      - '.github/workflows/sync-resenas.yml'

permissions:
  contents: write
  actions: write   # para disparar el deploy de Pages (los commits del bot no lo hacen solos)

# Evita que un workflow_dispatch manual choque con la corrida horaria por cron.
concurrency:
  group: sync-resenas
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Sincronizar reseñas desde Firebase
        run: python scripts/sync_resenas.py
      - name: Commit si hubo cambios
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resenas-cache.json
          if git diff --cached --quiet; then
            echo "Sin cambios en resenas-cache.json. Finalizando."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: actualizar cache de reseñas desde Firebase"
          for i in 1 2 3 4 5; do
            if git push; then echo "changed=true" >> $GITHUB_OUTPUT; exit 0; fi
            git fetch origin main
            git rebase -X ours origin/main || { git checkout --ours -- resenas-cache.json; git add resenas-cache.json; GIT_EDITOR=true git rebase --continue || git rebase --abort; }
            sleep $((i * 2))
          done
          echo "❌ No se pudo subir resenas-cache.json." >&2
          exit 1

      - name: Publicar en GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Disparando el deploy de Pages (los commits del bot no lo disparan solos)…"
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages.yml/dispatches" \
            -d '{"ref":"main"}'
