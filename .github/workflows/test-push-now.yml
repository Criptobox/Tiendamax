name: 🧪 Test Push (envío manual inmediato)

# Workflow para probar notificaciones a cualquier hora.
# IGNORA horarios y anti-spam.
#
# Cómo usar:
#   1) Ve a GitHub → Actions → "🧪 Test Push (envío manual inmediato)"
#   2) Pulsa "Run workflow" → Run workflow
#   3) En 30 segundos llega el push a tu móvil

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: push-notifications
  cancel-in-progress: false

jobs:
  test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin

      - name: Enviar push de prueba
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/test_push_now.py

      - name: Commit cola si se vació
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .push_queue.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios"
            exit 0
          fi
          git commit -m "chore: cola vaciada tras test push [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            git pull --rebase origin main || git rebase --abort 2>/dev/null
            sleep 2
          done
          exit 1
