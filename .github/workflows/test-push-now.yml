name: 🧪 Test Push (envío manual inmediato)

# Workflow para probar notificaciones a cualquier hora.
# IGNORA horarios y anti-spam.
#
# Cómo usar:
#   1) Ve a GitHub → Actions → "🧪 Test Push (envío manual inmediato)"
#   2) Pulsa "Run workflow" → Run workflow
#   3) En 30 segundos llega el push a tu móvil

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: push-notifications
  cancel-in-progress: false

jobs:
  test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin

      - name: Enviar push de prueba
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/test_push_now.py

