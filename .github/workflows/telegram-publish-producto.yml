name: 📢 Publicar producto nuevo en Telegram

on:
  push:
    branches: [main]
    paths:
      - 'products.json'
      - 'data.json'
      - 'config.json'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # necesita el commit anterior para detectar productos nuevos

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests pillow

      - name: Publicar en Telegram y gestionar mensajes
        run: python bot/publish_producto.py
        env:
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}

      - name: Guardar IDs de mensajes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot/telegram_messages.json
          git diff --cached --quiet || git commit -m "chore: actualizar IDs mensajes Telegram"
          git push || true
