name: 📢 Publicar producto nuevo en Telegram

on:
  push:
    branches: [main]
    paths:
      - 'productos.json'
      - 'data.json'
      - 'config.json'
  workflow_dispatch:

concurrency:
  group: telegram-publish-producto
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # necesita el commit anterior para detectar productos nuevos

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt
      - name: Publicar en Telegram y gestionar mensajes
        run: python bot/publish_producto.py
        env:
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}

      - name: Guardar IDs de mensajes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot/telegram_messages.json
          if git diff --cached --quiet; then
            echo "Sin cambios de IDs para subir"
            exit 0
          fi
          git commit -m "chore: actualizar IDs mensajes Telegram"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "✅ IDs de Telegram guardados."
              exit 0
            fi
            git fetch origin main
            git rebase -X ours origin/main || { git checkout --ours -- bot/telegram_messages.json; git add bot/telegram_messages.json; GIT_EDITOR=true git rebase --continue || git rebase --abort; }
            sleep $((i * 2))
          done
          echo "❌ No se pudieron guardar los IDs de mensajes de Telegram." >&2
          exit 1
