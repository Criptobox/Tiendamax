name: Desplegar reglas Firebase RTDB

on:
  push:
    branches:
      - main
    paths:
      - 'firebase-rules.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-firebase-rules
  cancel-in-progress: false

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Desplegar reglas de base de datos
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only database --project tiendamax-8feb5
          rm -f /tmp/sa.json
