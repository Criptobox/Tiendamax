name: Resetear contador de visitas

# Pone /analytics/visitas/count en 0. Solo manual (workflow_dispatch):
# úsalo cuando quieras arrancar el conteo de visitas desde cero.
on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: reset-visitas
  cancel-in-progress: false

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Poner el contador en 0
        run: |
          curl -sS -X PUT -H "Content-Type: application/json" -d '0' \
            "https://tiendamax-8feb5-default-rtdb.firebaseio.com/analytics/visitas/count.json"
          echo
          echo "Valor actual:"
          curl -sS "https://tiendamax-8feb5-default-rtdb.firebaseio.com/analytics/visitas/count.json"
