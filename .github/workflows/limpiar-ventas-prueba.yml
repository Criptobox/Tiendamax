name: 🗑 Limpiar ventas de prueba

on:
  workflow_dispatch:

jobs:
  limpiar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar firebase-admin
        run: pip install firebase-admin

      - name: Borrar ventas con productos de prueba (A, B, etc.)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python3 - <<'EOF'
          import json, os, firebase_admin
          from firebase_admin import credentials, db

          sa = json.loads(os.environ["FIREBASE_SERVICE_ACCOUNT"])
          cred = credentials.Certificate(sa)
          firebase_admin.initialize_app(cred, {
              "databaseURL": "https://tiendamax-8feb5-default-rtdb.firebaseio.com"
          })

          ref = db.reference("ventas")
          ventas = ref.get() or {}

          # Nombres de productos de prueba a eliminar
          PRUEBA = {"a", "b", "test", "prueba", "producto a", "producto b"}

          borradas = 0
          for key, v in ventas.items():
              nombre = str(v.get("producto", "")).strip().lower()
              if nombre in PRUEBA:
                  ref.child(key).delete()
                  print(f"  ✅ Borrada: {v.get('producto')} — ${v.get('precio')} (key={key})")
                  borradas += 1

          print(f"\nTotal borradas: {borradas} de {len(ventas)} ventas")
          EOF
