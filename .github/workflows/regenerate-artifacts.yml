name: Regenerar páginas /p/ y /c/, sitemap, subcategorías y comisiones

on:
  push:
    branches:
      - main
    paths:
      - 'productos.json'
      - 'subcategorias.json'
      - 'categorias.json'
      - 'scripts/regenerate_artifacts.py'
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # para disparar el deploy de Pages (los commits del bot no lo hacen solos)

# Evita carreras si llegan varios pushes seguidos
concurrency:
  group: regenerate-artifacts
  cancel-in-progress: false

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necesitamos token con permiso de write para hacer push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar regenerador
        run: python scripts/regenerate_artifacts.py

      - name: Regenerar productos-lite.json (evita que la tienda quede desfasada)
        run: python scripts/build-productos-lite.py

      - name: Commit y push si hubo cambios
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add p/ c/ sitemap.xml subcategorias.json comisiones.json productos-lite.json 2>/dev/null || true
          # Asegurar que archivos nuevos en p/ y c/ también queden en el índice
          git ls-files --others --exclude-standard -- p/ c/ | xargs -r git add 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios para subir"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # [skip ci] para no disparar de nuevo el workflow de push notifications
          git commit -m "chore: regenerar artefactos (sitemap, /p/, subcats) [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "✅ artefactos publicados."
              echo "changed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            git fetch origin main
            git rebase -X ours origin/main || { git checkout --ours -- p/ c/ sitemap.xml subcategorias.json comisiones.json productos-lite.json 2>/dev/null; git add p/ c/ sitemap.xml subcategorias.json comisiones.json productos-lite.json 2>/dev/null; GIT_EDITOR=true git rebase --continue || git rebase --abort; }
            sleep $((i * 2))
          done
          echo "❌ No se pudieron publicar los artefactos." >&2
          exit 1

      - name: Publicar en GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Disparando el deploy de Pages (los commits del bot no lo disparan solos)…"
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages.yml/dispatches" \
            -d '{"ref":"main"}'
