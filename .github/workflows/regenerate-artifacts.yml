name: Regenerar páginas /p/, sitemap, subcategorías y comisiones

on:
  push:
    branches:
      - main
    paths:
      - 'productos.json'
      - 'subcategorias.json'
      - 'scripts/regenerate_artifacts.py'
  workflow_dispatch:

permissions:
  contents: write

# Evita carreras si llegan varios pushes seguidos
concurrency:
  group: regenerate-artifacts
  cancel-in-progress: false

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necesitamos token con permiso de write para hacer push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar regenerador
        run: python scripts/regenerate_artifacts.py

      - name: Regenerar productos-lite.json (evita que la tienda quede desfasada)
        run: python scripts/build-productos-lite.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add p/ sitemap.xml subcategorias.json comisiones.json productos-lite.json 2>/dev/null || true
          # Asegurar que archivos nuevos en p/ también queden en el índice
          git ls-files --others --exclude-standard -- p/ | xargs -r git add 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios para subir"
            exit 0
          fi
          # [skip ci] para no disparar de nuevo el workflow de push notifications
          git commit -m "chore: regenerar artefactos (sitemap, /p/, subcats) [skip ci]"
          git push
