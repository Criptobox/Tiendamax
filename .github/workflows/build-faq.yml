name: Agregar faq.json / faq.html desde el agente

on:
  schedule:
    # Cada 6 horas (minuto 37 para no chocar con otros workflows en :00/:07/:22/:30)
    - cron: '37 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/build_faq.py'
      - '.github/workflows/build-faq.yml'

permissions:
  contents: write
  actions: write   # para disparar el deploy de Pages (los commits del bot no lo hacen solos)

concurrency:
  group: build-faq
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Instalar dependencias
        run: python -m pip install -r scripts/requirements.txt
      - name: Agregar preguntas reales desde Firebase
        run: python scripts/build_faq.py
      - name: Commit si hubo cambios
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add faq.json faq.html
          if git diff --cached --quiet; then
            echo "Sin cambios en faq.json/faq.html. Finalizando."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: actualizar faq.json/faq.html desde el agente [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then echo "changed=true" >> $GITHUB_OUTPUT; exit 0; fi
            git fetch origin main
            git rebase -X ours origin/main || { git checkout --ours -- faq.json faq.html; git add faq.json faq.html; GIT_EDITOR=true git rebase --continue || git rebase --abort; }
            sleep $((i * 2))
          done
          echo "❌ No se pudo subir faq.json/faq.html." >&2
          exit 1

      - name: Publicar en GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Disparando el deploy de Pages (los commits del bot no lo disparan solos)…"
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages.yml/dispatches" \
            -d '{"ref":"main"}'
