name: Notificaciones Push (al cambiar productos o tasa)

on:
  push:
    branches:
      - main
    paths:
      - 'config.json'
      - 'productos.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: send-notifications
  cancel-in-progress: false

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    if: "github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin

      - name: Detectar cambios y enviar
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/send_notifications.py
