name: Actualizar tasa desde elTOQUE

on:
  schedule:
    # Cada 30 min de 8AM a 5PM hora Cuba (UTC-4) = 12:00 a 21:00 UTC
    - cron: '*/30 12-21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

# Evita que un workflow_dispatch manual choque con la corrida por cron (cada 30 min).
concurrency:
  group: update-eltoque-rate
  cancel-in-progress: false

jobs:
  update-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Actualizar tasa base desde elTOQUE
        env:
          ELTOQUE_API_KEY: ${{ secrets.ELTOQUE_API_KEY }}
          ELTOQUE_API_URL: ${{ secrets.ELTOQUE_API_URL }}
        run: python scripts/update_rate_from_eltoque.py

      - name: Commit y push si hubo cambios
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config.json

          if git diff --cached --quiet; then
            echo "Sin cambios en la tasa. Finalizando."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "chore: actualizar tasa base desde elTOQUE"
          for i in 1 2 3 4; do
            if git push; then
              echo "changed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep $((i * 3))
            git pull --rebase origin main || git rebase --abort 2>/dev/null
          done
          git push
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Publicar tasa del día en canal Telegram
        if: steps.commit.outputs.changed == 'true'
        env:
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
        run: python bot/canal_tasa.py

      - name: Disparar notificaciones push si cambió la tasa
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run send-push-notifications.yml \
            --repo ${{ github.repository }} \
            --ref main

      - name: Publicar en GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Disparando el deploy de Pages (los commits del bot no lo disparan solos)…"
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages.yml/dispatches" \
            -d '{"ref":"main"}'
