name: Actualizar tasa desde elTOQUE

on:
  schedule:
    # 12:30 UTC ≈ 8:30 AM en La Habana cuando está en UTC-4.
    # Si cambia el huso/horario, puedes ajustar este valor.
    - cron: '30 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Actualizar tasa base desde elTOQUE
        run: python scripts/update_rate_from_eltoque.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config.json
          if git diff --cached --quiet; then
            echo "Sin cambios para subir"
            exit 0
          fi
          git commit -m "chore: actualizar tasa base desde elTOQUE"
          git push
