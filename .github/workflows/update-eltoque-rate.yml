name: Actualizar tasa desde elTOQUE

on:
  schedule:
    # Cada 30 min de 8AM a 5PM hora Cuba (UTC-4) = 12:00 a 21:00 UTC
    - cron: '*/30 12-21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write 

jobs:
  update-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Actualizar tasa base desde elTOQUE
        env:
          ELTOQUE_API_KEY: ${{ secrets.ELTOQUE_API_KEY }}
          ELTOQUE_API_URL: ${{ secrets.ELTOQUE_API_URL }}
        run: python scripts/update_rate_from_eltoque.py

      - name: Commit y push si hubo cambios
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config.json

          if git diff --cached --quiet; then
            echo "Sin cambios en la tasa. Finalizando."
            exit 0
          fi

          git commit -m "chore: actualizar tasa base desde elTOQUE"
          for i in 1 2 3 4; do
            if git push; then exit 0; fi
            sleep $((i * 3))
            git pull --rebase origin main || git rebase --abort 2>/dev/null
          done
          git push
