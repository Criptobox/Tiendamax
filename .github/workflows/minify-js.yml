name: Minificar JS

on:
  push:
    branches:
      - main
    paths:
      - 'js/src/*.src.js'         # fuentes legibles — trigger real
      - 'scripts/minify_js.py'    # cambios al pipeline también lo disparan
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # para disparar el deploy de Pages (los commits del bot no lo hacen solos)

# Una sola minificación a la vez; sin cancelar — si hay cola, espera.
# Grupo compartido con build-css para que NO corran a la vez (evita la carrera
# de push al commitear ambos bundles minificados sobre main).
concurrency:
  group: repo-autobuild
  cancel-in-progress: false

jobs:
  minify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # npx descarga esbuild automáticamente; node ya viene en ubuntu-latest.
      - name: Minificar js/src/*.src.js → js/src/*.js
        run: python scripts/minify_js.py

      - name: Unir los módulos minificados en js/tm-bundle.js
        run: python scripts/build_js_bundle.py

      - name: Bump SW cache version
        run: |
          VERSION="tiendamax-$(date -u +%Y%m%d%H%M)"
          sed -i "s/const CACHE_NAME = 'tiendamax-[^']*'/const CACHE_NAME = '$VERSION'/" sw.js
          echo "SW version: $VERSION"

      - name: Sincronizar cache-busting (?v=) en HTML
        run: python scripts/bump_versions.py

      - name: Commit y push si hubo cambios
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/src/*.js js/tm-bundle.js sw.js index.html admin.html 404.html
          if git diff --cached --quiet; then
            echo "Sin cambios — nada que subir."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: minificar js/src/*.js [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then echo "changed=true" >> $GITHUB_OUTPUT; exit 0; fi
            git pull --rebase origin main || git rebase --abort 2>/dev/null
            sleep 2
          done
          exit 1

      - name: Publicar en GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Disparando el deploy de Pages (los commits del bot no lo disparan solos)…"
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages.yml/dispatches" \
            -d '{"ref":"main"}'
