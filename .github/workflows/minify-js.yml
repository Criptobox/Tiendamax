name: Minificar JS

on:
  push:
    branches:
      - main
    paths:
      - 'js/script.src.js'       # fuente legible — único trigger real
      - 'scripts/minify_js.py'   # cambios al pipeline también lo disparan
  workflow_dispatch:

permissions:
  contents: write

# Una sola minificación a la vez; sin cancelar — si hay cola, espera.
concurrency:
  group: minify-js
  cancel-in-progress: false

jobs:
  minify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # npx descarga terser automáticamente; node ya viene en ubuntu-latest.
      - name: Minificar js/script.src.js → js/script.js
        run: python scripts/minify_js.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/script.js
          if git diff --cached --quiet; then
            echo "Sin cambios en js/script.js — nada que subir."
            exit 0
          fi
          git commit -m "chore: minificar js/script.js [skip ci]"
          git push
