name: 🤖 Web Health Agent

on:
  schedule:
    # Cada 30 min. GitHub puede retrasarlo algunos minutos.
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests firebase-admin

      - name: Probar tienda publicada y avisar
        run: python scripts/web_health_agent.py
        env:
          SITE_URL: https://tiendamax.org
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
