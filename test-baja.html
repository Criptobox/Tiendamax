<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Test baja · TiendaMax</title>
<style>
  :root{--bg:#0b0b10;--panel:#14141e;--line:rgba(255,255,255,.08);--txt:#ececf2;--muted:#8a8a9a;
    --orange:#ff6a00;--orange2:#ff3d00;--red:#ff4d4d;--yellow:#ffb020;--green:#2ecc71;--blue:#4aa3ff;
    --mono:ui-monospace,'Cascadia Code',Menlo,Consolas,monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,106,0,.10),transparent 60%),var(--bg);
    color:var(--txt);font-family:var(--mono);line-height:1.5;padding:24px 16px 70px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto}
  h1{font-size:22px;font-weight:800;margin-bottom:6px}
  h1 em{font-style:normal;color:var(--orange)}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:20px;max-width:60ch}
  button{font-family:var(--mono);font-size:14px;font-weight:700;background:linear-gradient(135deg,#e74c3c,#c0392b);
    color:#fff;border:none;border-radius:12px;padding:14px 20px;cursor:pointer;width:100%;box-shadow:0 8px 22px rgba(231,76,60,.28)}
  button:disabled{opacity:.5;cursor:wait}
  .verdict{margin:18px 0;padding:16px;border-radius:14px;border:1px solid var(--line);background:var(--panel);font-size:13.5px;display:none}
  .verdict.show{display:block}
  .verdict.red{border-color:rgba(255,77,77,.4)} .verdict.red b{color:var(--red)}
  .verdict.green{border-color:rgba(46,204,113,.4)} .verdict.green b{color:var(--green)}
  .verdict.yellow{border-color:rgba(255,176,32,.4)} .verdict.yellow b{color:var(--yellow)}
  .log{margin-top:18px;background:#08080c;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:12px;min-height:120px;white-space:pre-wrap;word-break:break-word}
  .log .ok{color:var(--green)} .log .err{color:var(--red)} .log .warn{color:var(--yellow)} .log .info{color:var(--blue)} .log .dim{color:var(--muted)}
  .step{margin:2px 0}
</style>
</head>
<body>
<div class="wrap">
  <h1>Tienda<em>Max</em> · Test de baja (borrar suscriptor)</h1>
  <p class="sub">Ábrela <b>en el mismo navegador</b> que quedó pegado en el analytics. Intenta borrar el token de este dispositivo de tu base de datos y te dice si funcionó o por qué no. Útil para quitar el suscriptor atascado y diagnosticar.</p>
  <button id="run">🗑️ Borrar este dispositivo de los suscriptores</button>
  <div class="verdict" id="verdict"></div>
  <div class="log" id="log"></div>
</div>

<script>
"use strict";
const log=document.getElementById("log"), verdict=document.getElementById("verdict");
function L(m,c){const d=document.createElement("div");d.className="step "+(c||"dim");d.textContent=m;log.appendChild(d);}
function V(h,c){verdict.className="verdict show "+c;verdict.innerHTML=h;}
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=()=>rej(new Error("No cargó "+src));document.head.appendChild(s);});}

document.getElementById("run").addEventListener("click", async ()=>{
  const btn=document.getElementById("run"); btn.disabled=true; log.innerHTML=""; verdict.className="verdict";
  try{
    if(!("Notification" in window) || !("serviceWorker" in navigator)){ V("<b>Navegador sin soporte.</b>","red"); btn.disabled=false; return; }

    L("1) Cargando config.json…");
    const cfg=(await (await fetch("config.json?_="+Date.now(),{cache:"no-store"})).json()).firebaseConfig;
    if(!cfg||!cfg.projectId){ V("<b>config.json sin firebaseConfig.</b>","red"); btn.disabled=false; return; }
    const vapid=cfg.vapidKey, dbURL=cfg.databaseURL||("https://"+cfg.projectId+"-default-rtdb.firebaseio.com");
    L("   db: "+dbURL,"info");

    // Obtener el token de ESTE dispositivo (aunque ya hayas borrado fcmToken local)
    L("2) Obteniendo el token de este dispositivo…");
    if(Notification.permission!=="granted"){
      L("   permiso = "+Notification.permission,"warn");
      V("<b>Este navegador no tiene el permiso activo</b>, así que no puedo recalcular su token para borrarlo con precisión. Si el suscriptor pegado es este mismo navegador y ya bloqueaste el permiso, usa el botón <b>🧹 Limpiar tokens inválidos</b> del analytics: FCM detectará que ya no es entregable y lo borrará.","yellow");
      btn.disabled=false; return;
    }
    await loadScript("https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js");
    await loadScript("https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js");
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    const messaging=firebase.messaging();
    const reg=await navigator.serviceWorker.register("/firebase-messaging-sw.js",{scope:"/firebase-cloud-messaging-push-scope"});
    await navigator.serviceWorker.ready;
    let token;
    try{ token=await messaging.getToken({vapidKey:vapid, serviceWorkerRegistration:reg}); }
    catch(e){ L("   ❌ getToken: "+e.message,"err"); V("<b>No se pudo obtener el token</b> para borrarlo. Detalle: "+e.message,"red"); btn.disabled=false; return; }
    if(!token){ V("<b>Sin token.</b> Revisa permiso/VAPID.","red"); btn.disabled=false; return; }
    L("   token …"+token.slice(-12),"ok");

    // DELETE
    L("3) Borrando de /tokens (DELETE)…");
    const id=btoa(token).replace(/=/g,"").replace(/\+/g,"-").replace(/\//g,"_");
    const url=dbURL+"/tokens/"+id+".json";
    let w; try{ w=await fetch(url,{method:"DELETE"}); }
    catch(e){ L("   ❌ red: "+e.message,"err"); V("<b>No se pudo conectar a la base.</b> "+e.message,"red"); btn.disabled=false; return; }
    L("   respuesta HTTP "+w.status, w.ok?"ok":"err");
    let txt=""; try{ txt=await w.text(); }catch(e){}
    if(txt) L("   cuerpo: "+txt.slice(0,200), w.ok?"dim":"warn");

    if(w.ok){
      // Confirmar que ya no existe
      L("4) Verificando que se borró…");
      let existe=null;
      try{ const r=await fetch(url+"?_="+Date.now(),{cache:"no-store"}); if(r.ok){ const v=await r.json(); existe=(v!==null);} }catch(e){}
      // marcar desuscrito local para que no vuelva
      try{ localStorage.setItem("tm_push_desuscrito","1"); localStorage.removeItem("fcmToken"); }catch(e){}
      if(existe===false){
        V("✅ <b>¡Borrado y confirmado!</b> El token ya no está en /tokens. Si en el analytics seguía apareciendo y el DELETE funciona, entonces antes el problema era que <b>se re-suscribía al recargar</b> — asegúrate de tener subido el parche <b>push-fix.js v3</b> (el que respeta la baja). Refresca el analytics y verás el número correcto.","green");
      } else {
        V("✅ <b>DELETE aceptado (HTTP 200).</b> El borrado sí está permitido por tus reglas. Si igual reaparece, es porque <b>se vuelve a suscribir al recargar</b>: sube el parche <b>push-fix.js v3</b>. Refresca el analytics.","green");
      }
    } else if(w.status===401 || /permission denied|auth/i.test(txt)){
      V("🚨 <b>Encontrado: tus reglas NO permiten borrar.</b> El DELETE devolvió <b>Permission denied</b>. Tus reglas dejan <i>escribir</i> tokens pero no <i>borrarlos</i> (probablemente el <code>.write</code> exige que el dato exista). Por eso las bajas no se quitan. <br><br>Solución: restaura el archivo <b>firebase-rules.json</b> que te pasé (usa <code>.write: true</code> + <code>.validate</code>, que sí permite borrar) en Firebase → Realtime Database → Reglas.","red");
    } else {
      V("⚠️ <b>El DELETE falló con HTTP "+w.status+".</b> Mira el cuerpo arriba.","yellow");
    }
  }catch(e){ L("ERROR: "+e.message,"err"); V("<b>Error inesperado:</b> "+e.message,"red"); }
  btn.disabled=false;
});
</script>
</body>
</html>
