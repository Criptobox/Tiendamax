<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sin conexión — TiendaMax</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#0C0806;
    color:#fff;
    font-family:'DM Sans',system-ui,sans-serif;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
  }
  .icon{font-size:64px;margin-bottom:24px;filter:grayscale(0.3)}
  h1{
    font-size:clamp(22px,5vw,32px);
    font-weight:800;
    color:#FF6B35;
    margin-bottom:12px;
  }
  p{
    font-size:clamp(14px,3.5vw,16px);
    color:rgba(255,255,255,0.65);
    max-width:320px;
    line-height:1.6;
    margin-bottom:32px;
  }
  .btn{
    background:linear-gradient(135deg,#FF6B35,#C9A96E);
    color:#fff;
    border:none;
    border-radius:50px;
    padding:14px 32px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    text-decoration:none;
    display:inline-block;
    transition:opacity .2s;
  }
  .btn:active{opacity:0.8}
  .logo{
    position:absolute;
    top:24px;
    left:50%;
    transform:translateX(-50%);
    font-size:18px;
    font-weight:800;
    color:#C9A96E;
    letter-spacing:1px;
  }
  .tip{
    margin-top:20px;
    font-size:12px;
    color:rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="logo">TIENDAMAX</div>
<div class="icon">📡</div>
<h1>Sin conexión</h1>
<p>Necesitas internet para ver la tienda. Revisa tu WiFi o datos móviles e inténtalo de nuevo.</p>
<a class="btn" onclick="location.reload()">Reintentar</a>
<p class="tip">Si tienes cobertura débil, espera unos segundos y vuelve a intentar.</p>
</body>
</html>
