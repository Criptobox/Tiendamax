<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Test suscripción · TiendaMax</title>
<style>
  :root{--bg:#0b0b10;--panel:#14141e;--line:rgba(255,255,255,.08);--txt:#ececf2;--muted:#8a8a9a;
    --orange:#ff6a00;--orange2:#ff3d00;--red:#ff4d4d;--yellow:#ffb020;--green:#2ecc71;--blue:#4aa3ff;
    --mono:ui-monospace,'Cascadia Code',Menlo,Consolas,monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,106,0,.10),transparent 60%),var(--bg);
    color:var(--txt);font-family:var(--mono);line-height:1.5;padding:24px 16px 70px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto}
  h1{font-size:22px;font-weight:800;margin-bottom:6px}
  h1 em{font-style:normal;color:var(--orange)}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:20px;max-width:60ch}
  button{font-family:var(--mono);font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--orange),var(--orange2));
    color:#fff;border:none;border-radius:12px;padding:14px 20px;cursor:pointer;width:100%;box-shadow:0 8px 22px rgba(255,106,0,.28)}
  button:disabled{opacity:.5;cursor:wait}
  .verdict{margin:18px 0;padding:16px;border-radius:14px;border:1px solid var(--line);background:var(--panel);font-size:13.5px;display:none}
  .verdict.show{display:block}
  .verdict.red{border-color:rgba(255,77,77,.4)} .verdict.red b{color:var(--red)}
  .verdict.green{border-color:rgba(46,204,113,.4)} .verdict.green b{color:var(--green)}
  .verdict.yellow{border-color:rgba(255,176,32,.4)} .verdict.yellow b{color:var(--yellow)}
  .log{margin-top:18px;background:#08080c;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:12px;min-height:120px;white-space:pre-wrap;word-break:break-word}
  .log .ok{color:var(--green)} .log .err{color:var(--red)} .log .warn{color:var(--yellow)} .log .info{color:var(--blue)} .log .dim{color:var(--muted)}
  .step{margin:2px 0}
</style>
</head>
<body>
<div class="wrap">
  <h1>Tienda<em>Max</em> · Test de suscripción push</h1>
  <p class="sub">Reproduce el alta de un suscriptor paso a paso y te dice exactamente dónde falla. Acepta el permiso de notificaciones cuando lo pida. Si todo sale bien, tu propio dispositivo queda suscrito.</p>
  <button id="run">▶️ Probar suscripción</button>
  <div class="verdict" id="verdict"></div>
  <div class="log" id="log"></div>
</div>

<script>
"use strict";
const log = document.getElementById("log");
const verdict = document.getElementById("verdict");
function L(msg, cls){ const d=document.createElement("div"); d.className="step "+(cls||"dim"); d.textContent=msg; log.appendChild(d); }
function V(html, cls){ verdict.className="verdict show "+cls; verdict.innerHTML=html; }

function loadScript(src){
  return new Promise((res,rej)=>{ const s=document.createElement("script"); s.src=src; s.onload=res; s.onerror=()=>rej(new Error("No cargó "+src)); document.head.appendChild(s); });
}

document.getElementById("run").addEventListener("click", async ()=>{
  const btn = document.getElementById("run");
  btn.disabled=true; log.innerHTML=""; verdict.className="verdict";
  try{
    // 0) Soporte
    L("0) Comprobando soporte del navegador…");
    if(!("Notification" in window)){ V("<b>Este navegador no soporta notificaciones.</b> Prueba en Chrome de Android.","red"); btn.disabled=false; return; }
    if(!("serviceWorker" in navigator)){ V("<b>Sin Service Workers.</b> El navegador no los soporta o estás en modo incógnito.","red"); btn.disabled=false; return; }
    L("   OK — Notification y Service Worker disponibles.","ok");

    // 1) Config
    L("1) Cargando config.json…");
    const cfgRes = await fetch("config.json?_="+Date.now(), {cache:"no-store"});
    if(!cfgRes.ok) throw new Error("config.json HTTP "+cfgRes.status);
    const cfg = (await cfgRes.json()).firebaseConfig;
    if(!cfg || !cfg.projectId){ V("<b>config.json no tiene firebaseConfig.</b> Reconfigura Firebase en el panel admin.","red"); btn.disabled=false; return; }
    const vapid = cfg.vapidKey;
    const dbURL = cfg.databaseURL || ("https://"+cfg.projectId+"-default-rtdb.firebaseio.com");
    L("   projectId: "+cfg.projectId,"info");
    L("   databaseURL: "+dbURL,"info");
    L("   vapidKey: "+(vapid?("…"+String(vapid).slice(-8)+" ("+String(vapid).length+" caract.)"):"❌ FALTA"), vapid?"info":"err");
    if(!vapid){ V("<b>Falta la clave VAPID</b> en config.json. Sin ella no se puede obtener token. Pégala en el panel admin → Configuración.","red"); btn.disabled=false; return; }

    // 2) Permiso
    L("2) Pidiendo permiso de notificaciones…");
    let perm = Notification.permission;
    if(perm==="default") perm = await Notification.requestPermission();
    L("   permiso = "+perm, perm==="granted"?"ok":"err");
    if(perm==="denied"){ V("<b>Bloqueaste las notificaciones en este dispositivo.</b> Eso explica por qué TÚ no te suscribes aquí, pero no por qué fallan otros. Reactívalas en Ajustes del navegador → Notificaciones.","yellow"); btn.disabled=false; return; }
    if(perm!=="granted"){ V("<b>No diste permiso.</b> Sin permiso no hay token.","yellow"); btn.disabled=false; return; }

    // 3) Service worker
    L("3) Registrando /firebase-messaging-sw.js…");
    let reg;
    try{
      reg = await navigator.serviceWorker.register("/firebase-messaging-sw.js", {scope:"/firebase-cloud-messaging-push-scope"});
      await navigator.serviceWorker.ready;
      L("   SW registrado ✓","ok");
    }catch(e){
      L("   ❌ "+e.message,"err");
      V("<b>El service worker de Firebase no se registró.</b> Verifica que /firebase-messaging-sw.js exista en la raíz y no tenga errores. Detalle: "+e.message,"red");
      btn.disabled=false; return;
    }

    // 4) Firebase SDK + getToken
    L("4) Cargando SDK de Firebase y pidiendo token…");
    await loadScript("https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js");
    await loadScript("https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js");
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    if(!firebase.messaging.isSupported()){ V("<b>FCM no soportado en este navegador.</b>","red"); btn.disabled=false; return; }
    const messaging = firebase.messaging();
    let token;
    try{
      token = await messaging.getToken({ vapidKey: vapid, serviceWorkerRegistration: reg });
    }catch(e){
      L("   ❌ getToken falló: "+(e.code||"")+" "+e.message,"err");
      V("<b>Falló getToken().</b> Casi siempre es la <b>clave VAPID inválida o regenerada</b> en Firebase. Genera de nuevo el certificado Web Push en Firebase → Configuración del proyecto → Cloud Messaging, copia la clave VAPID y pégala en tu panel admin. Detalle: "+(e.code||e.message),"red");
      btn.disabled=false; return;
    }
    if(!token){ V("<b>getToken() devolvió vacío.</b> Suele ser permiso o VAPID. Revisa la clave VAPID.","yellow"); btn.disabled=false; return; }
    L("   token obtenido ✓ (…"+token.slice(-12)+", "+token.length+" caract.)","ok");

    // 5) Escritura en /tokens  (la prueba clave)
    L("5) Escribiendo el token en /tokens de tu base de datos…");
    const id = btoa(token).replace(/=/g,"").replace(/\+/g,"-").replace(/\//g,"_");
    const body = { token: token, timestamp: Date.now(), userAgent: navigator.userAgent };
    const url = dbURL + "/tokens/" + id + ".json";
    let w;
    try{
      w = await fetch(url, { method:"PUT", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
    }catch(e){
      L("   ❌ red: "+e.message,"err");
      V("<b>No se pudo conectar a la base de datos.</b> ¿databaseURL correcta? ¿Conexión activa? Detalle: "+e.message,"red");
      btn.disabled=false; return;
    }
    L("   respuesta HTTP "+w.status, w.ok?"ok":"err");
    let txt=""; try{ txt = await w.text(); }catch(e){}
    if(txt) L("   cuerpo: "+txt.slice(0,200), w.ok?"dim":"warn");

    if(w.ok){
      V("✅ <b>¡Funciona!</b> El token se guardó correctamente en /tokens. Tu dispositivo quedó suscrito. <br><br>Si en producción igual no se agregan suscriptores, el problema es del lado del usuario (no dan permiso, o navegador sin soporte), no de tu configuración.","green");
    } else if(w.status===401 || /permission denied|auth/i.test(txt)){
      V("🚨 <b>Encontrado: tus reglas bloquean la escritura.</b> La base devolvió <b>Permission denied</b>. Tus reglas de Realtime Database NO permiten que un visitante anónimo escriba en /tokens (probablemente quedaron en \"auth != null\"). <br><br>Por eso nadie se suscribe. Te paso abajo las reglas correctas para pegar en Firebase → Realtime Database → Reglas.","red");
    } else {
      V("⚠️ <b>La escritura falló con HTTP "+w.status+".</b> Mira el cuerpo de la respuesta arriba. Si menciona 'validation' es que las reglas .validate rechazan el dato; si es 404, revisa databaseURL.","yellow");
    }
  }catch(e){
    L("ERROR inesperado: "+e.message,"err");
    V("<b>Error inesperado:</b> "+e.message,"red");
  }
  btn.disabled=false;
});
</script>
</body>
</html>
