<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="60%" style="stop-color:#161616"/>
      <stop offset="100%" style="stop-color:#1E1A10"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="30%" style="stop-color:#C9A96E"/>
      <stop offset="70%" style="stop-color:#E8C88A"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C88A"/>
      <stop offset="100%" style="stop-color:#C9A96E"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <!-- Diagonal texture -->
    <pattern id="tex" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#tex)"/>

  <!-- Top gold line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#goldLine)"/>

  <!-- Left accent bar -->
  <rect x="80" y="100" width="3" height="430" fill="url(#goldLine)" transform="rotate(90, 80, 315)"/>

  <!-- Logo badge "M" -->
  <rect x="100" y="230" width="70" height="70" rx="16" fill="url(#badge)"/>
  <text x="135" y="284" font-family="Georgia, serif" font-size="40" font-weight="900" text-anchor="middle" fill="#0D0D0D">M</text>

  <!-- Brand name -->
  <text x="190" y="275" font-family="Georgia, serif" font-size="52" font-weight="900" fill="white" letter-spacing="-1">Tienda</text>
  <text x="470" y="275" font-family="Georgia, serif" font-size="52" font-weight="900" fill="#C9A96E" letter-spacing="-1">Max</text>

  <!-- Tagline -->
  <text x="100" y="320" font-family="'DM Sans', Arial, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">Tecnología y Electrónica en Cuba</text>

  <!-- Gold divider -->
  <rect x="100" y="345" width="220" height="2" fill="url(#goldLine)"/>

  <!-- Feature pills -->
  <!-- WiFi -->
  <rect x="100" y="370" width="150" height="40" rx="20" fill="rgba(201,169,110,0.12)" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.4"/>
  <text x="175" y="395" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#C9A96E" text-anchor="middle" letter-spacing="0.5">📡 WiFi</text>

  <!-- Energia -->
  <rect x="265" y="370" width="160" height="40" rx="20" fill="rgba(201,169,110,0.12)" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.4"/>
  <text x="345" y="395" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#C9A96E" text-anchor="middle" letter-spacing="0.5">⚡ Energía</text>

  <!-- Celulares -->
  <rect x="440" y="370" width="175" height="40" rx="20" fill="rgba(201,169,110,0.12)" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.4"/>
  <text x="527" y="395" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#C9A96E" text-anchor="middle" letter-spacing="0.5">📱 Celulares</text>

  <!-- Stats row -->
  <text x="100" y="460" font-family="'DM Sans', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.35)" letter-spacing="2" text-transform="uppercase">⭐ 4.9  ·  500+ CLIENTES  ·  ENVÍO RÁPIDO</text>

  <!-- CTA right side -->
  <!-- Big decorative circle -->
  <circle cx="980" cy="315" r="220" fill="rgba(201,169,110,0.04)" stroke="rgba(201,169,110,0.12)" stroke-width="1"/>
  <circle cx="980" cy="315" r="160" fill="rgba(201,169,110,0.04)" stroke="rgba(201,169,110,0.08)" stroke-width="1"/>

  <!-- WhatsApp CTA -->
  <rect x="860" y="250" width="240" height="60" rx="30" fill="#C9A96E"/>
  <text x="980" y="287" font-family="'DM Sans', Arial, sans-serif" font-size="17" font-weight="700" fill="#0D0D0D" text-anchor="middle" letter-spacing="0.3">💬 Comprar ahora</text>

  <!-- URL -->
  <text x="980" y="350" font-family="'DM Sans', Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">tiendamax.org</text>

  <!-- Bottom gold line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#goldLine)"/>
</svg>
