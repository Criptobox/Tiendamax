    <script>
    (function() {
        const DEFAULT_BANNERS = [
            { "url": "https://tiendamax.org/imagenes/banner_1778892244690_0.jpg", "link": "https://chat.whatsapp.com/F5ZYhWjY0ot2qz8EA4FynX" },
            { "url": "https://tiendamax.org/imagenes/banner_1778892244691_1.png", "link": "https://chat.whatsapp.com/KZKSTOOEMksL5P7xRmOpOS" },
            { "url": "https://tiendamax.org/imagenes/banner_1778892244691_2.jpg", "link": "https://chat.whatsapp.com/J1k53J92WAV23ShQznt9We?mode=gi_t" }
        ];

        window.cargarBannersAdmin = function() {
            try {
                const b = localStorage.getItem('banners_config');
                return b ? JSON.parse(b) : DEFAULT_BANNERS;
            } catch {
                return DEFAULT_BANNERS;
            }
        };

        window.guardarBannersAdmin = function(bannersArray) {
            localStorage.setItem('banners_config', JSON.stringify(bannersArray));
            window.dispatchEvent(new Event('storage'));
        };

        document.addEventListener('DOMContentLoaded', () => {
            let banners = cargarBannersAdmin();
            setTimeout(() => {
                if (typeof renderSlider === 'function') {
                    renderSlider();
                }
            }, 500);

            setInterval(() => {
                if (typeof renderSlider === 'function') {
                    try {
                        renderSlider();
                    } catch {
                        banners = DEFAULT_BANNERS;
                        renderSlider();
                    }
                }
            }, 5000);
        });
    })();
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        window.abrirLoginAdmin = function() {
            const modal = document.getElementById('loginModal');
            if(modal) {
                modal.classList.remove('hidden');
                modal.style.removeProperty('display');
                setTimeout(() => document.getElementById('adminPassword')?.focus(), 100);
            }
        };
        if (typeof abrirAdminPanel === 'function') {
            abrirAdminPanel();
        }
    });
    </script>

    <script>
    (function actualizarEnlacesWhatsApp() {
      const num = localStorage.getItem('whatsappNumero') || '5354320170';
      document.querySelectorAll('a[href*="wa.me/"]').forEach(a => {
        a.href = a.href.replace(/wa\.me\/\d+/, 'wa.me/' + num);
      });
    })();
